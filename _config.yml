title: 技术笔记本
description: 每日代码记录与思考
url: "https://yourusername.github.io"
baseurl: ""

# 基础设置
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# 自定义变量
author:
  name: 你的名字
  github: yourgithub

# 分页
paginate: 5
paginate_path: "/page:num"

# Markdown解析
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

# 排除文件
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor
